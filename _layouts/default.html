<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <!-- Mermaid.js: renders architecture diagrams from ```mermaid code blocks -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
        // Jekyll/kramdown wraps ```mermaid blocks in <div class="language-mermaid">
        // Transform them into <pre class="mermaid"> for Mermaid.js to render
        document.querySelectorAll('.language-mermaid').forEach(function (container) {
          var code = container.querySelector('code');
          if (!code) return;
          var pre = document.createElement('pre');
          pre.className = 'mermaid';
          pre.textContent = code.textContent;
          container.replaceWith(pre);
        });
        mermaid.run();
      });
    </script>

  </body>

</html>
