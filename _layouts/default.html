<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <!-- Mermaid.js: renders architecture diagrams from ```mermaid code blocks -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
        // Kramdown renders ```mermaid blocks as <pre><code class="language-mermaid">
        // Replace with <pre class="mermaid"> so Mermaid.js can render the diagram
        document.querySelectorAll('code.language-mermaid').forEach(function (code) {
          var pre = code.parentElement;
          if (!pre) return;
          var mermaidPre = document.createElement('pre');
          mermaidPre.className = 'mermaid';
          mermaidPre.textContent = code.textContent;
          pre.replaceWith(mermaidPre);
        });
        mermaid.run();
      });
    </script>

  </body>

</html>
